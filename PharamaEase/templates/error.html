{% extends 'base.html' %}
{% block content %}

<div class="container w-50 border border-3 shadow p-5 mt-5 text-center mb-5">
 {% if messages %}
<ul class="messages">
 {% for message in messages %}
   <li{% if message.tags %} class="{{ message.tags }}"{% endif %}>
     {{ message }}
   </li>
 {% endfor %}
</ul>
{% endif %}

    </div>

{% endblock %}
