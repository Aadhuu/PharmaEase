{% extends 'base.html' %}
{% load crispy_forms_tags %}
{% block content %}

<div class="container p-5 mb-3">
    <h2 class="text-center">Add Category</h2>

    {% if form %}
    <form method="post" enctype="multipart/form-data">
        {% csrf_token%}
    {{form|crispy}}
        <div class="mb-3 mt-3">
    <input type="submit" class="btn btn-outline-dark">
        </div>
    </form>
{% endif %}
</div>
{% endblock %}
