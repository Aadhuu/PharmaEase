{% extends 'base.html' %}

{% block content %}

<div class="container mt-4">

    <h3 class="mb-4">{{ subcategory.name }}</h3>

    <div class="row">

        {% for i in products %}

        <div class="col-md-3 mb-4">

            <div class="card h-100 shadow-sm">

                <img src="{{ i.image.url }}"
                     class="card-img-top"
                     style="height:220px; object-fit:cover;">

                <div class="card-body text-center">

                    <h5>{{ i.name }}</h5>

                    <p class="text-success fw-bold">
                        ₹{{ i.price }}
                    </p>

                    {% if i.prescription %}
                        <span class="badge bg-danger">
                            Prescription Required
                        </span>
                    {% endif %}

                    <br><br>

                    <a href="{% url 'shop:productdetail' i.id%}"
                       class="btn btn-primary w-100">
                        View Details
                    </a>

                </div>

            </div>

        </div>


        {% endfor %}

    </div>

</div>

{% endblock %}
